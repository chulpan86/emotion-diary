<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>앱 아이콘</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  :root {
    --coral:#D97757; --coral-mid:#E5A688; --coral-light:#F0CDBA; --coral-bg:#FCEEE7;
    --bg:#FAF7F2; --ink:#1a1a1a; --muted:#A38D7A; --line:#E5DDD3; --white:#FFFFFF;
  }
  body { background:#ECE7DF; display:flex; flex-direction:column; align-items:center; gap:0; padding:0;
    font-family:-apple-system,BlinkMacSystemFont,"Apple SD Gothic Neo","Noto Sans KR",sans-serif; }
  .serif { font-family:"Apple SD Gothic Neo",Georgia,"Nanum Myeongjo",serif; }
  .label { font-size:13px; color:#8a7866; letter-spacing:0.5px; }

  .card { width:800px; height:800px; background:var(--bg); position:relative; overflow:hidden; display:flex; flex-direction:column; align-items:center; justify-content:center; padding-bottom:120px; }
  .card::before { content:''; position:absolute; inset:0; background:radial-gradient(circle at 50% 38%, rgba(217,119,87,0.07), transparent 55%); }

  /* 메인 큰 아이콘 */
  .hero-icon { position:relative; z-index:2; width:300px; height:300px; border-radius:68px;
    background:linear-gradient(155deg,#FDF4EE,#FCEEE7); display:flex; align-items:center; justify-content:center;
    box-shadow:0 30px 70px rgba(217,119,87,0.3), inset 0 1px 0 rgba(255,255,255,0.8); }
  .hero-icon::after { content:''; position:absolute; inset:0; border-radius:68px; border:1px solid rgba(217,119,87,0.12); }

  .icon-name { position:relative; z-index:2; margin-top:34px; font-size:26px; font-weight:600; letter-spacing:-0.5px; }
  .icon-name .dot { display:inline-block; width:7px; height:7px; background:var(--coral); border-radius:50%; margin-left:3px; vertical-align:baseline; }
  .icon-tag { position:relative; z-index:2; font-size:15px; color:var(--muted); margin-top:10px; letter-spacing:-0.2px; }

  /* 하단 변형 아이콘들 */
  .variants { position:absolute; bottom:60px; left:50%; transform:translateX(-50%); z-index:2; display:flex; gap:30px; align-items:center; justify-content:center; }
  .v-icon { width:88px; height:88px; border-radius:21px; display:flex; align-items:center; justify-content:center;
    box-shadow:0 10px 24px rgba(0,0,0,0.12); }
  .v-light { background:linear-gradient(155deg,#FDF4EE,#FCEEE7); }
  .v-coral { background:linear-gradient(155deg,#E8896B,#D97757); }
  .v-dark { background:linear-gradient(155deg,#2A2A2A,#1a1a1a); }
  .v-cap { position:absolute; bottom:-26px; left:0; right:0; text-align:center; font-size:11px; color:var(--muted); }
  .v-wrap { position:relative; }
</style>
</head>
<body>
  <div class="card">
    <!-- 메인 아이콘 -->
    <div class="hero-icon">
      <svg width="184" height="120" viewBox="0 0 120 56">
        <line x1="6" y1="42" x2="114" y2="42" stroke="#E5C4B0" stroke-width="1"/>
        <circle cx="16" cy="40" r="2" fill="#E5A688" opacity="0.5"/>
        <circle cx="30" cy="36" r="2.4" fill="#E5A688" opacity="0.72"/>
        <circle cx="44" cy="38" r="2.7" fill="#D97757" opacity="0.85"/>
        <circle cx="58" cy="30" r="3.1" fill="#D97757"/>
        <circle cx="74" cy="24" r="3.8" fill="#D97757"/>
        <circle cx="90" cy="16" r="4.6" fill="#D97757"/>
        <circle cx="106" cy="8" r="5.8" fill="#D97757"/>
      </svg>
    </div>
    <div class="icon-name serif">감정다이어리<span class="dot"></span></div>
    <div class="icon-tag serif">하루의 마침표, 나의 좌표</div>

    <!-- 변형 -->
    <div class="variants">
      <div class="v-wrap">
        <div class="v-icon v-light">
          <svg width="56" height="36" viewBox="0 0 120 56"><line x1="6" y1="42" x2="114" y2="42" stroke="#E5C4B0" stroke-width="1.2"/><circle cx="44" cy="38" r="2.7" fill="#D97757" opacity="0.85"/><circle cx="58" cy="30" r="3.1" fill="#D97757"/><circle cx="74" cy="24" r="3.8" fill="#D97757"/><circle cx="90" cy="16" r="4.6" fill="#D97757"/><circle cx="106" cy="8" r="5.8" fill="#D97757"/></svg>
        </div>
        <div class="v-cap">라이트</div>
      </div>
      <div class="v-wrap">
        <div class="v-icon v-coral">
          <svg width="56" height="36" viewBox="0 0 120 56"><line x1="6" y1="42" x2="114" y2="42" stroke="rgba(255,255,255,0.4)" stroke-width="1.2"/><circle cx="44" cy="38" r="2.7" fill="#fff" opacity="0.7"/><circle cx="58" cy="30" r="3.1" fill="#fff" opacity="0.82"/><circle cx="74" cy="24" r="3.8" fill="#fff" opacity="0.9"/><circle cx="90" cy="16" r="4.6" fill="#fff"/><circle cx="106" cy="8" r="5.8" fill="#fff"/></svg>
        </div>
        <div class="v-cap">코랄</div>
      </div>
      <div class="v-wrap">
        <div class="v-icon v-dark">
          <svg width="56" height="36" viewBox="0 0 120 56"><line x1="6" y1="42" x2="114" y2="42" stroke="rgba(255,255,255,0.18)" stroke-width="1.2"/><circle cx="44" cy="38" r="2.7" fill="#E5A688" opacity="0.7"/><circle cx="58" cy="30" r="3.1" fill="#E5A688" opacity="0.85"/><circle cx="74" cy="24" r="3.8" fill="#D97757"/><circle cx="90" cy="16" r="4.6" fill="#D97757"/><circle cx="106" cy="8" r="5.8" fill="#D97757"/></svg>
        </div>
        <div class="v-cap">다크</div>
      </div>
    </div>
  </div>
</body>
</html>
