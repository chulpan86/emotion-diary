<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>홈 화면 추가 안내</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  :root {
    --coral:#D97757; --coral-mid:#E5A688; --coral-light:#F0CDBA; --coral-bg:#FCEEE7;
    --bg:#FAF7F2; --ink:#1a1a1a; --muted:#A38D7A; --line:#E5DDD3; --line-soft:#F2EBE2; --white:#FFFFFF;
  }
  body { background:#ECE7DF; display:flex; flex-direction:column; align-items:center; gap:0; padding:0;
    font-family:-apple-system,BlinkMacSystemFont,"Apple SD Gothic Neo","Noto Sans KR",sans-serif; }
  .serif { font-family:"Apple SD Gothic Neo",Georgia,"Nanum Myeongjo",serif; }
  .label { font-size:13px; color:#8a7866; letter-spacing:0.5px; }

  .card { width:800px; height:800px; background:var(--bg); position:relative; overflow:hidden; display:flex; flex-direction:column; }
  .card::before { content:''; position:absolute; inset:0; background:radial-gradient(circle at 50% 8%, rgba(217,119,87,0.06), transparent 45%); }

  .ghead { position:relative; z-index:2; text-align:center; padding:64px 60px 0; }
  .ghead .brand { display:inline-flex; align-items:center; gap:8px; margin-bottom:34px; }
  .ghead .brand .dot-logo { display:flex; align-items:flex-end; gap:3px; }
  .ghead .brand .dot-logo i { display:block; width:6px; border-radius:4px; background:var(--coral-mid); }
  .ghead .brand .nm { font-size:18px; font-weight:600; letter-spacing:-0.3px; }
  .ghead .brand .nm b { color:var(--coral); }
  .ghead .ttl { font-size:42px; font-weight:600; line-height:1.34; letter-spacing:-1.2px; }
  .ghead .ttl .ac { color:var(--coral); }
  .ghead .sub { font-size:18px; color:var(--muted); margin-top:18px; letter-spacing:-0.2px; }

  /* 아이콘 + 화살표 + 홈화면 미니목업 */
  .showcase { position:relative; z-index:2; flex:1; display:flex; align-items:center; justify-content:center; gap:40px; padding:0 50px; }

  .app-icon { width:150px; height:150px; border-radius:34px; background:var(--coral-bg); position:relative;
    box-shadow:0 16px 36px rgba(217,119,87,0.28); display:flex; align-items:center; justify-content:center; }
  .icon-cap { position:absolute; bottom:-30px; left:0; right:0; text-align:center; font-size:14px; color:var(--muted); font-weight:500; }

  .arrow { display:flex; flex-direction:column; align-items:center; gap:8px; }
  .arrow .a-line { font-size:38px; color:var(--coral); }
  .arrow .a-t { font-size:13px; color:var(--muted); white-space:nowrap; }

  /* 미니 홈스크린 */
  .home-mock { width:210px; height:300px; border-radius:32px; background:linear-gradient(160deg,#E8DFD4,#D9CCBC);
    padding:20px 18px; position:relative; box-shadow:0 16px 36px rgba(0,0,0,0.14); }
  .home-mock .grid { display:flex; flex-wrap:wrap; justify-content:center; width:178px; margin:0 auto; }
  .home-mock .app { width:38px; height:38px; border-radius:11px; background:rgba(255,255,255,0.4); margin:6px; }
  .home-mock .app.ours { background:var(--coral-bg); display:flex; align-items:center; justify-content:center; box-shadow:0 3px 8px rgba(217,119,87,0.3); position:relative; }
  .home-mock .app.ours::after { content:''; position:absolute; inset:-4px; border:2.5px solid var(--coral); border-radius:14px; }

  .gfoot { position:relative; z-index:2; background:var(--ink); color:#fff; padding:26px 60px; text-align:center; }
  .gfoot .t { font-size:18px; font-weight:500; letter-spacing:-0.2px; line-height:1.5; }
  .gfoot .t b { color:var(--coral-mid); font-weight:600; }
</style>
</head>
<body>
  <div class="card">
    <div class="ghead">
      <div class="brand">
        <div class="dot-logo"><i style="height:9px"></i><i style="height:14px"></i><i style="height:21px;background:var(--coral)"></i></div>
        <div class="nm serif">감정다이어리<b>.</b></div>
      </div>
      <div class="ttl serif">홈 화면에 추가하면<br><span class="ac">앱처럼</span> 열려요</div>
      <div class="sub">한 번 추가하면 매일 한 탭으로 기록</div>
    </div>

    <div class="showcase">
      <div class="app-icon">
        <svg width="92" height="62" viewBox="0 0 120 56">
          <line x1="6" y1="42" x2="114" y2="42" stroke="#E5C9B8" stroke-width="1"/>
          <circle cx="16" cy="40" r="2" fill="#E5A688" opacity="0.5"/>
          <circle cx="30" cy="36" r="2.4" fill="#E5A688" opacity="0.7"/>
          <circle cx="44" cy="38" r="2.6" fill="#D97757" opacity="0.85"/>
          <circle cx="58" cy="30" r="3" fill="#D97757"/>
          <circle cx="74" cy="24" r="3.6" fill="#D97757"/>
          <circle cx="90" cy="16" r="4.4" fill="#D97757"/>
          <circle cx="106" cy="8" r="5.6" fill="#D97757"/>
        </svg>
        <div class="icon-cap">감정다이어리</div>
      </div>

      <div class="arrow">
        <div class="a-line">→</div>
        <div class="a-t">홈 화면에 추가</div>
      </div>

      <div class="home-mock">
        <div class="grid">
          <div class="app"></div><div class="app"></div><div class="app"></div><div class="app"></div>
          <div class="app"></div>
          <div class="app ours">
            <svg width="30" height="20" viewBox="0 0 120 56"><line x1="6" y1="42" x2="114" y2="42" stroke="#E5C9B8" stroke-width="1.5"/><circle cx="44" cy="38" r="3" fill="#D97757" opacity="0.85"/><circle cx="58" cy="30" r="3.5" fill="#D97757"/><circle cx="74" cy="24" r="4" fill="#D97757"/><circle cx="90" cy="16" r="5" fill="#D97757"/><circle cx="106" cy="8" r="6" fill="#D97757"/></svg>
          </div>
          <div class="app"></div><div class="app"></div>
          <div class="app"></div><div class="app"></div><div class="app"></div><div class="app"></div>
        </div>
      </div>
    </div>

    <div class="gfoot">
      <div class="t"><b>아이폰</b> 공유 → 홈 화면에 추가 &nbsp;|&nbsp; <b>안드로이드</b> 메뉴 → 앱 설치</div>
    </div>
  </div>
</body>
</html>
