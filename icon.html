<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>감정다이어리 공유 카드</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  :root {
    --coral:#D97757; --coral-mid:#E5A688; --coral-light:#F0CDBA; --coral-bg:#FCEEE7;
    --bg:#FAF7F2; --ink:#1a1a1a; --muted:#A38D7A; --line:#E5DDD3; --line-soft:#F2EBE2; --white:#FFFFFF;
  }
  body { background:#ECE7DF; display:flex; flex-direction:column; align-items:center; gap:0; padding:0;
    font-family:-apple-system,BlinkMacSystemFont,"Apple SD Gothic Neo","Noto Sans KR",sans-serif; }
  .serif { font-family:"Apple SD Gothic Neo",Georgia,"Nanum Myeongjo",serif; }
  .label { font-size:13px; color:#8a7866; letter-spacing:0.5px; }

  /* === 카드 공통 === */
  .card { width:800px; height:800px; background:var(--bg); position:relative; overflow:hidden;
    display:flex; flex-direction:column; }
  .card::before { content:''; position:absolute; inset:0;
    background:radial-gradient(circle at 78% 14%, rgba(217,119,87,0.07), transparent 42%); }

  /* 배경 점선 좌표 그래프 (브랜드 모티프) */
  .bg-graph { position:absolute; left:0; right:0; bottom:96px; height:300px; opacity:0.9; }

  /* 상단 영역 */
  .top { position:relative; z-index:2; padding:64px 70px 0; }
  .brand { display:flex; align-items:center; gap:9px; margin-bottom:54px; }
  .brand .dot-logo { display:flex; align-items:flex-end; gap:3px; }
  .brand .dot-logo i { display:block; width:7px; border-radius:4px; background:var(--coral-mid); }
  .brand .name { font-size:21px; font-weight:600; letter-spacing:-0.4px; }
  .brand .name b { color:var(--coral); }

  .headline { font-size:54px; font-weight:600; line-height:1.32; letter-spacing:-1.5px; color:var(--ink); }
  .headline .accent { color:var(--coral); }
  .sub { font-size:21px; color:var(--muted); margin-top:26px; line-height:1.6; letter-spacing:-0.3px; }

  /* 감정 이모지 줄 */
  .emo-strip { position:relative; z-index:2; display:flex; align-items:flex-end; justify-content:center; gap:18px;
    margin-top:auto; padding:0 50px 60px; }
  .emo-strip .e { display:flex; flex-direction:column; align-items:center; gap:11px; }
  .emo-strip .e .cap { font-size:14px; color:var(--muted); font-weight:500; }

  /* 하단 CTA 바 */
  .cta { position:relative; z-index:2; background:var(--ink); color:#fff; padding:30px 70px;
    display:flex; align-items:center; justify-content:space-between; }
  .cta .t { font-size:21px; font-weight:600; letter-spacing:-0.3px; }
  .cta .t span { color:var(--coral-mid); }
  .cta .pill { background:var(--coral); color:#fff; font-size:18px; font-weight:600; padding:14px 28px; border-radius:100px; letter-spacing:-0.2px; }
</style>
</head>
<body>
  <div class="card" id="card">
    <!-- 배경 좌표 그래프 -->
    <svg class="bg-graph" viewBox="0 0 800 340" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">
      <line x1="40" y1="300" x2="760" y2="300" stroke="#E5DDD3" stroke-width="1.4"/>
      <polyline points="80,288 200,262 320,272 440,224 560,180 680,118 740,70"
        fill="none" stroke="#F0CDBA" stroke-width="2.4" stroke-dasharray="3 7" stroke-linecap="round"/>
      <circle cx="80" cy="288" r="4" fill="#E5A688" opacity="0.55"/>
      <circle cx="200" cy="262" r="5" fill="#E5A688" opacity="0.7"/>
      <circle cx="320" cy="272" r="5.5" fill="#D97757" opacity="0.8"/>
      <circle cx="440" cy="224" r="6.5" fill="#D97757"/>
      <circle cx="560" cy="180" r="8" fill="#D97757"/>
      <circle cx="680" cy="118" r="10" fill="#D97757"/>
      <circle cx="740" cy="70" r="13" fill="#D97757"/>
    </svg>

    <div class="top">
      <div class="brand">
        <div class="dot-logo"><i style="height:10px"></i><i style="height:16px"></i><i style="height:24px;background:var(--coral)"></i></div>
        <div class="name serif">감정다이어리<b>.</b></div>
      </div>
      <div class="headline serif">매일의 기분에<br>좌표를 찍어요<span class="accent">.</span></div>
      <div class="sub">하루의 마침표, 나의 좌표.<br>30초면 오늘의 마음이 기록돼요.</div>
    </div>

    <!-- 감정 이모지 -->
    <div class="emo-strip" id="emoStrip"></div>

    <div class="cta">
      <div class="t serif">로그인 없이, <span>이 기기에 안전하게</span></div>
      <div class="pill">써보기 →</div>
    </div>
  </div>

<script>
/* === 앱과 동일한 손그림 SVG 이모지 === */
function faceWrap(inner, topPad){
  topPad = topPad || 0;
  const top = -46 - topPad;
  const h = 92 + topPad;
  return '<svg width="46" height="'+(46*h/92).toFixed(1)+'" viewBox="-46 '+top+' 92 '+h+'">'+inner+'</svg>';
}
function drawExcited(){return faceWrap('<circle cx="0" cy="6" r="34" fill="#F2C94C"/><path d="M-16 -20 L8 -60 L26 -18 Z" fill="#D97757"/><path d="M-16 -20 L8 -60 L8 -18 Z" fill="#E5A688"/><circle cx="8" cy="-62" r="5" fill="#5DCAA5"/><rect x="-42" y="-16" width="6" height="6" fill="#85B7EB" transform="rotate(25 -39 -13)"/><rect x="38" y="-8" width="6" height="6" fill="#ED93B1" transform="rotate(-30 41 -5)"/><circle cx="-35" cy="18" r="3" fill="#5DCAA5"/><circle cx="36" cy="24" r="3" fill="#F2A6A0"/><path d="M-20 -4 Q-14 -10 -8 -4" fill="none" stroke="#5A4632" stroke-width="3.2" stroke-linecap="round"/><path d="M8 -4 Q14 -10 20 -4" fill="none" stroke="#5A4632" stroke-width="3.2" stroke-linecap="round"/><path d="M-16 16 Q0 32 16 16 Q12 26 0 26 Q-12 26 -16 16 Z" fill="#5A4632"/><path d="M-12 19 Q0 24 12 19" fill="none" stroke="#fff" stroke-width="2.6"/><ellipse cx="0" cy="24" rx="4" ry="2.4" fill="#E2574C"/>', 25);}
function drawJoy(){return faceWrap('<circle cx="0" cy="6" r="34" fill="#F2C94C"/><path d="M-21 -2 Q-15 -9 -9 -2" fill="none" stroke="#5A4632" stroke-width="3.2" stroke-linecap="round"/><path d="M9 -2 Q15 -9 21 -2" fill="none" stroke="#5A4632" stroke-width="3.2" stroke-linecap="round"/><path d="M-20 12 Q0 32 20 12 Q16 27 0 27 Q-16 27 -20 12 Z" fill="#5A4632"/><path d="M-15 15 Q0 21 15 15" fill="none" stroke="#fff" stroke-width="2.8"/>');}
function drawCalm(){return faceWrap('<circle cx="0" cy="6" r="34" fill="#F2C94C"/><path d="M-20 0 Q-14 4 -8 0" fill="none" stroke="#5A4632" stroke-width="3" stroke-linecap="round"/><path d="M8 0 Q14 4 20 0" fill="none" stroke="#5A4632" stroke-width="3" stroke-linecap="round"/><path d="M-14 14 Q0 24 14 14" fill="none" stroke="#5A4632" stroke-width="3.2" stroke-linecap="round"/><circle cx="-24" cy="10" r="4.5" fill="#F2A6A0" opacity="0.5"/><circle cx="24" cy="10" r="4.5" fill="#F2A6A0" opacity="0.5"/>');}
function drawAnxious(){return faceWrap('<circle cx="0" cy="6" r="34" fill="#F2C94C"/><path d="M-34 -16 A34 34 0 0 1 34 -16 Q0 -4 -34 -16 Z" fill="#85B7EB"/><circle cx="-13" cy="2" r="5.5" fill="#fff" stroke="#5A4632" stroke-width="1.8"/><circle cx="13" cy="2" r="5.5" fill="#fff" stroke="#5A4632" stroke-width="1.8"/><circle cx="-13" cy="2" r="2.3" fill="#5A4632"/><circle cx="13" cy="2" r="2.3" fill="#5A4632"/><path d="M-9 19 Q0 13 9 19" fill="none" stroke="#5A4632" stroke-width="2.8" stroke-linecap="round"/><path d="M24 -12 Q28 -6 24 0 Q20 -6 24 -12 Z" fill="#5DCAA5"/>');}
function drawSad(){return faceWrap('<circle cx="0" cy="6" r="34" fill="#F2C94C"/><path d="M-21 -8 Q-15 -2 -9 -8" fill="none" stroke="#5A4632" stroke-width="3" stroke-linecap="round"/><path d="M9 -8 Q15 -2 21 -8" fill="none" stroke="#5A4632" stroke-width="3" stroke-linecap="round"/><ellipse cx="0" cy="20" rx="10" ry="12" fill="#5A4632"/><path d="M-16 2 Q-20 14 -16 26 Q-11 17 -13 4 Z" fill="#85B7EB"/><path d="M16 2 Q20 14 16 26 Q11 17 13 4 Z" fill="#85B7EB"/>');}

const SHOW = [
  {draw:drawExcited, cap:'신남', pad:25},
  {draw:drawJoy, cap:'기쁨'},
  {draw:drawCalm, cap:'평온'},
  {draw:drawAnxious, cap:'불안'},
  {draw:drawSad, cap:'슬픔'},
];
function scaleEmoji(svg, w){
  return svg.replace(/width="46" height="([\d.]+)"/, function(m,h){
    const nh = (parseFloat(h) * w / 46).toFixed(1);
    return 'width="'+w+'" height="'+nh+'"';
  });
}
const strip = document.getElementById('emoStrip');
SHOW.forEach(s=>{
  const d=document.createElement('div'); d.className='e';
  d.innerHTML = '<div>'+scaleEmoji(s.draw(),84)+'</div><div class="cap">'+s.cap+'</div>';
  strip.appendChild(d);
});
</script>
</body>
</html>
